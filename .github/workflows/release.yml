name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build .exe
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: amd64
        run: go build -v -trimpath -ldflags="-s -w" -o hwinfo-telegraf-plugin.exe ./cmd

      - name: Compute checksum
        run: sha256sum hwinfo-telegraf-plugin.exe > hwinfo-telegraf-plugin.exe.sha256

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            hwinfo-telegraf-plugin.exe
            hwinfo-telegraf-plugin.exe.sha256
          generate_release_notes: true
